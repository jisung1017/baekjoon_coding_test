name: Auto organize problems on: push: paths: - "*.py" jobs: organize: runs-on: ubuntu-latest steps: - uses: actions/checkout@v3 - name: Set up Python uses: actions/setup-python@v4 with: python-version: "3.10" - name: Run organizer run: | python organize.py - name: Commit changes run: | git config --global user.email "action@github.com" git config --global user.name "GitHub Action" git add . git commit -m "Auto organize problems" || echo "No changes" git push
